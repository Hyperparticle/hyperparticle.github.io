# Builds and deploys a Jekyll site to GitHub Pages using GitHub's
# pre-installed Jekyll environment (github-pages gem, Jekyll 3.x).
#
# To switch to a self-managed Jekyll version (e.g. Jekyll 4.x):
#   1. Replace the "Build with Jekyll" step with:
#        - name: Setup Ruby
#          uses: ruby/setup-ruby@v1
#          with:
#            ruby-version: '3.1'
#            bundler-cache: true
#        - name: Build with Jekyll
#          run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
#          env:
#            JEKYLL_ENV: production
#   2. Update Gemfile to pin: gem 'jekyll', '~> 4.3'
#   3. Remove this comment block
name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
